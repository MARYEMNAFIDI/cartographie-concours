<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartographie SOREC - Concours 2025</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: #f7f7f7; }
    #map { height: 92vh; width: 100vw; }
    .header { padding: 10px 14px; background: #0a3d62; color: #fff; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">Concours SOREC 2025 - Lieux et intensite des evenements</div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([33.042387, -5.988573], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const lieuxData = [{"lieu": "HARAS NATIONAL DE MEKNES", "latitude": 33.8984131, "longitude": -5.5321582, "nb_journees": 7, "nb_evenements": 7, "nb_types_concours": 3, "nb_chevaux_uniques": 1063, "note_globale_moyenne": 77.16, "date_debut": "2025-06-09", "date_fin": "2025-06-19"}, {"lieu": "HARAS NATIONAL D EL JADIDA", "latitude": 33.2440832, "longitude": -8.4767251, "nb_journees": 5, "nb_evenements": 5, "nb_types_concours": 5, "nb_chevaux_uniques": 728, "note_globale_moyenne": 169.85, "date_debut": "2025-06-28", "date_fin": "2025-07-26"}, {"lieu": "HARAS NATIONAL DE BOUZNIKA", "latitude": 33.781005, "longitude": -7.1610294, "nb_journees": 3, "nb_evenements": 3, "nb_types_concours": 3, "nb_chevaux_uniques": 711, "note_globale_moyenne": 80.31, "date_debut": "2025-07-05", "date_fin": "2025-07-07"}, {"lieu": "HARAS NATIONAL DE MARRAKECH", "latitude": 31.6258257, "longitude": -7.9891608, "nb_journees": 3, "nb_evenements": 3, "nb_types_concours": 3, "nb_chevaux_uniques": 499, "note_globale_moyenne": 84.56, "date_debut": "2025-06-21", "date_fin": "2025-06-24"}, {"lieu": "HARAS NATIONAL D OUJDA", "latitude": 34.677874, "longitude": -1.929306, "nb_journees": 2, "nb_evenements": 2, "nb_types_concours": 2, "nb_chevaux_uniques": 359, "note_globale_moyenne": 55.22, "date_debut": "2025-07-17", "date_fin": "2025-07-18"}, {"lieu": "FQUIH BEN SALAH", "latitude": 32.4212148, "longitude": -6.7470785, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 293, "note_globale_moyenne": 45.01, "date_debut": "2025-07-11", "date_fin": "2025-07-11"}, {"lieu": "CPEE DE SEBT GZOULA", "latitude": 32.108297, "longitude": -9.084263, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 219, "note_globale_moyenne": 55.49, "date_debut": "2025-06-05", "date_fin": "2025-06-05"}, {"lieu": "CPEE DE GUERCIF", "latitude": 34.225576, "longitude": -3.352345, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 206, "note_globale_moyenne": 49.78, "date_debut": "2025-07-20", "date_fin": "2025-07-20"}, {"lieu": "CPEE DE MISSOUR", "latitude": 33.047057, "longitude": -3.992578, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 159, "note_globale_moyenne": 50.91, "date_debut": "2025-07-23", "date_fin": "2025-07-23"}, {"lieu": "CPEE DE AIN BENI MATHAR", "latitude": 34.0163901, "longitude": -2.025809, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 146, "note_globale_moyenne": 48.68, "date_debut": "2025-07-15", "date_fin": "2025-07-15"}, {"lieu": "AGADIR", "latitude": 30.4205162, "longitude": -9.5838532, "nb_journees": 1, "nb_evenements": 1, "nb_types_concours": 1, "nb_chevaux_uniques": 115, "note_globale_moyenne": 58.68, "date_debut": "2025-06-03", "date_fin": "2025-06-03"}];

    lieuxData.forEach((d) => {
      const radius = 6 + Math.sqrt(d.nb_evenements) * 3;
      const marker = L.circleMarker([d.latitude, d.longitude], {
        radius,
        color: '#0a3d62',
        weight: 1,
        fillColor: '#1e90ff',
        fillOpacity: 0.55
      }).addTo(map);

      const note = d.note_globale_moyenne === null ? 'N/A' : d.note_globale_moyenne.toFixed(2);
      const popup = `
        <b>${d.lieu}</b><br/>
        Journees: ${d.nb_journees}<br/>
        Evenements: ${d.nb_evenements}<br/>
        Types concours: ${d.nb_types_concours}<br/>
        Chevaux uniques: ${d.nb_chevaux_uniques}<br/>
        Note globale moyenne: ${note}<br/>
        Periode: ${d.date_debut} au ${d.date_fin}
      `;
      marker.bindPopup(popup);
    });
  </script>
</body>
</html>
